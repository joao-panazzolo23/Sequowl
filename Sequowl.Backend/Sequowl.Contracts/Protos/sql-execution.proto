syntax = "proto3";

import "google/protobuf/any.proto";
option csharp_namespace = "Sequowl.Contracts";

//THIS IS PROTO's NAMESPACE
package sql_execution;

message SqlExecutionRequest{
  string Sql = 1;
}

message SqlExecutionResponse{
  double UpdatedLines = 1;
  repeated google.protobuf.Any Data = 2; //equivalent to dynamic
  double TimeElapsed = 3;
