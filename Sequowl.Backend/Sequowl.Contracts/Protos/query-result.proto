syntax = "proto3";

//Specific code for c# code gen.
//If this code is not provided, source gen will use Proto's namespace instead.
option csharp_namespace = "Sequowl.Contracts";

import "google/protobuf/timestamp.proto";
//THIS IS PROTO's NAMESPACE
package query_result;

service ExecuteQuery{
  rpc ExecuteQuery(QueryRequest) returns (QueryResult);
}

message QueryRequest{
  string Sql = 1;
  string Host = 2;
  string Database = 3;
  string Password = 4;
  string Provider = 5;
  string Username = 6;
  string Schema = 7;
  string ConnectionString = 8;
}

message QueryResult {
  repeated Column columns = 1;
}

message Column {
  string name = 1;
  string type = 2;
}

message Row {
  repeated Value values = 1;
}

message Value {
  oneof value {
    string string_value = 1;
    int64 int_value = 2;
    double double_value = 3;
    bool bool_value = 4;
    bytes binary_value = 5;
    google.protobuf.Timestamp datetime_value = 6;
  }
}