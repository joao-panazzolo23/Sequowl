syntax = "proto3";

//Specific code for c# code gen.
//If this code is not provided, source gen will use Proto's namespace instead.
option csharp_namespace = "Sequowl.Host";

//THIS IS PROTO's NAMESPACE
package greet;

// The greeting service definition.
service Greeter {
  // Sends a greeting
  rpc SayHello (HelloRequest) returns (HelloReply);

  //RPC is a method. HelloRequest is the parameter and everything after returns is a return object
}

// The request message containing the user's name.
message HelloRequest {
  string name = 1;
  string family = 2;
}
//Messages are our records. They store data just like any other OOP structure.
//These numbers after them are field numbers for positional matters.

// The response message containing the greetings.
message HelloReply {
  string message = 1;
}

